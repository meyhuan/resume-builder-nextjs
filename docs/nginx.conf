# For more information on configuration, see:
#   * Official English Documentation: http://nginx.org/en/docs/
#   * Official Russian Documentation: http://nginx.org/ru/docs/

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;

    gzip on; 
    gzip_static on; 
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 5;
    gzip_types text/plain application/javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;
    client_max_body_size 10M;

    include /etc/nginx/conf.d/*.conf;

    # HTTP 到 HTTPS 统一重定向
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;
        return 301 https://$host$request_uri;
    }

    # www 重定向到主域名
    server {  
        listen       443 ssl http2;  
        listen       [::]:443 ssl http2;  
        server_name www.aijianli.cn;  
      
        ssl_certificate "/usr/local/nginx/cert/15374705_www.aijianli.cn.pem";  
        ssl_certificate_key "/usr/local/nginx/cert/15374705_www.aijianli.cn.key";  
        ssl_session_cache shared:SSL:1m;  
        ssl_session_timeout  10m;  
        ssl_ciphers PROFILE=SYSTEM;  
        ssl_prefer_server_ciphers on;  
      
        return 301 https://aijianli.cn$request_uri;  
    }  

    # =========================================================
    # aijianli.cn 主站 (指向最新的 Next.js 项目，并保留旧版 H5 移动端)
    # =========================================================
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name aijianli.cn;

        ssl_certificate "/usr/local/nginx/cert/15374705_www.aijianli.cn.pem";
        ssl_certificate_key "/usr/local/nginx/cert/15374705_www.aijianli.cn.key";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        # 【保留】小程序和原有业务依赖的 Java 接口
        location /api {
            proxy_pass http://localhost:8080/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Is-API "true"; 
        }

        # 【保留】移动端旧版 H5 静态资源
#        location ^~ /m/assets/ {
#            alias /home/webapp/aijianli-h5-mobile/dist/assets/;
#            try_files $uri =404;
#            expires 1y;
#            add_header Cache-Control "public, immutable";
#        }

        # 【保留】移动端旧版 H5 入口
#        location ^~ /m/ {
#            alias /home/webapp/aijianli-h5-mobile/dist/;
#            try_files $uri $uri/ /m/index.html;
#        }

        # 校验文件
        location = /Ey1xL1LqWA.txt {
            alias /home/static/Ey1xL1LqWA.txt;
            access_log off;
        }

        # 【补充保留】旧版 /static/ 静态资源（避免小程序等丢图）
        location /static/ {
            root /home/webapp/aijianli-h5/dist;
            try_files $uri @legacy_static;
            expires max;
        }

        location @legacy_static {
            root /home/static;
            rewrite ^/static/(.*)$ /$1 break;
            try_files $uri =404;
            expires max;
        }

        # 【精准拦截】如果是手机端访问根目录，重定向到 /m/，否则转发给 Next.js
        location = / {
#            if ($http_user_agent ~* "(iphone|android|mobile|ipad)") {
#                return 302 /m/;
#            }
            # 如果不是手机端，转给 Next.js
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 其他所有请求全部走 Next.js 服务 (包含了 /next-api/ 路由以及其他内页)
        location / {
            proxy_pass http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 404 /404.html;
        location = /40x.html {}
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {}
    }

    # =========================================================
    # w2025.aijianli.cn (完整保留原版 Vue / H5 逻辑)
    # =========================================================
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name w2025.aijianli.cn;
    
        ssl_certificate "/usr/local/nginx/cert/w2025.aijianli.cn.pem";
        ssl_certificate_key "/usr/local/nginx/cert/w2025.aijianli.cn.key";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;
    
        root /home/webapp/aijianli-h5/dist/;
        index index.html;
    
        include /etc/nginx/default.d/*.conf;
    
#        location ^~ /m/assets/ {
#            alias /home/webapp/aijianli-h5-mobile/dist/assets/;
#            try_files $uri =404;
#            expires 1y;
#            add_header Cache-Control "public, immutable";
#        }
    
#        location ^~ /m/ {
#            alias /home/webapp/aijianli-h5-mobile/dist/;
#            try_files $uri $uri/ /m/index.html;
#        }
    
#        location = / {
#            if ($http_user_agent ~* "(iphone|android|mobile|ipad)") {
#                return 302 /m/;
#            }
#            try_files $uri $uri/ /index.html;
#        }
    
        location / {
            try_files $uri $uri/ /index.html;
        }
    
        location /assets/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    
        location = /sitemap.xml { try_files $uri =404; }
        location = /robots.txt  { try_files $uri =404; }
    
        location /api {
            proxy_pass http://localhost:8080/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Is-API "true";
        }
    
        location /admin {
            proxy_pass http://localhost:3002/;
            try_files $uri $uri/ /index.html;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-NginX-Proxy true;
            proxy_redirect off;
        }
    
        location /_next/static {
            alias /home/webapp/CVStore/.next/static/;
        }
    
        location = /Ey1xL1LqWA.txt {
            alias /home/static/Ey1xL1LqWA.txt;
            access_log off;
        }
    
        location /static/ {
            root /home/webapp/aijianli-h5/dist;
            try_files $uri @legacy_static;
            expires max;
        }
    
        location @legacy_static {
            root /home/static;
            rewrite ^/static/(.*)$ /$1 break;
            try_files $uri =404;
            expires max;
        }
    
        error_page 404 /404.html;
        location = /40x.html {}
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {}
    }

    # =========================================================
    # dolphinjob 保持原状
    # =========================================================
    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  dolphinjob.com www.dolphinjob.com;

        ssl_certificate "/usr/local/nginx/cert/18821352_dolphinjob.com.pem";
        ssl_certificate_key "/usr/local/nginx/cert/18821352_dolphinjob.com.key";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        root /home/webapp/dolphinjob/home/;
        index index.html;

        location = /robots.txt {
            allow all;
            log_not_found off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2)$ {
            expires max;
            add_header Cache-Control "public";
        }

        error_page 404 /404.html;
        location = /404.html {
            root /home/webapp/dolphinjob/home/;
        }
    }

    server {
        listen       443 ssl http2;
        listen       [::]:443 ssl http2;
        server_name  re.dolphinjob.com;

        ssl_certificate "/usr/local/nginx/cert/18821352_dolphinjob.com.pem";
        ssl_certificate_key "/usr/local/nginx/cert/18821352_dolphinjob.com.key";
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout  10m;
        ssl_ciphers PROFILE=SYSTEM;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass http://localhost:3001/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_set_header X-NginX-Proxy true;
            proxy_redirect off;
            try_files $uri $uri/ /index.html;
        }

        location /api/resume {
            proxy_pass http://localhost:8080/resume/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Is-API "true"; 
        }

        location /_next/static {
            alias /home/webapp/ResumeApp/.next/static/;
        }

        location /static/ {
            alias /home/webapp/ResumeApp/static/;
            expires max;
        }

        error_page 404 /404.html;
        location = /40x.html {}
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {}
    }
}